name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v

  build:
    name: Build Package
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Build executable (PyInstaller)
        run: |
          uv pip install pyinstaller
          uv run pyinstaller --onefile --name sandanalyze main.py

      - name: Package (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czf sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.tar.gz sandanalyze
          cd ..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          Compress-Archive -Path sandanalyze.exe -DestinationPath sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.zip
          cd ..

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          tar -czf sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.tar.gz sandanalyze
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandanalyze-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/sandanalyze-*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
