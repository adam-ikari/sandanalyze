name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Prevent concurrent builds on the same branch/tag
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          uv run pyinstaller \
            --onefile \
            --name sandanalyze \
            --add-data "core:core" \
            --add-data "gui:gui" \
            --add-data "models:models" \
            --hidden-import PyQt6.sip \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import matplotlib \
            --hidden-import scipy \
            --hidden-import ultralytics \
            main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run pyinstaller --onefile --name sandanalyze --add-data "core;core" --add-data "gui;gui" --add-data "models;models" --hidden-import PyQt6.sip --hidden-import cv2 --hidden-import numpy --hidden-import matplotlib --hidden-import scipy --hidden-import ultralytics main.py

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          chmod +x sandanalyze
          tar -czf sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.tar.gz sandanalyze
          cd ..

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          Compress-Archive -Path sandanalyze.exe -DestinationPath sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.zip
          cd ..

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          chmod +x sandanalyze
          tar -czf sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.tar.gz sandanalyze
          cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandanalyze-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            dist/sandanalyze-*.tar.gz
            dist/sandanalyze-*.zip
          if-no-files-found: warn

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sandanalyze-*

      - name: List downloaded artifacts
        run: ls -R artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
