name: CI Verification

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Prevent concurrent builds
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check code formatting (ruff)
        run: |
          uv pip install ruff
          uv run ruff check . --select E,W,F,I
        continue-on-error: true

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            .pytest_cache/
            test-reports/
          if-no-files-found: ignore

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          uv run pyinstaller \
            --onefile \
            --name sandanalyze \
            --add-data "core:core" \
            --add-data "gui:gui" \
            --hidden-import PyQt6.sip \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import matplotlib \
            --hidden-import scipy \
            --hidden-import ultralytics \
            main.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run pyinstaller --onefile --name sandanalyze --add-data "core;core" --add-data "gui;gui" --hidden-import PyQt6.sip --hidden-import cv2 --hidden-import numpy --hidden-import matplotlib --hidden-import scipy --hidden-import ultralytics main.py

      - name: Verify executable exists
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            if [ ! -f "dist/sandanalyze.exe" ]; then
              echo "Error: Windows executable not found!"
              exit 1
            fi
            echo "✓ Windows executable built successfully"
          else
            if [ ! -f "dist/sandanalyze" ]; then
              echo "Error: Executable not found!"
              exit 1
            fi
            echo "✓ Executable built successfully"
          fi

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          chmod +x sandanalyze
          tar -czf sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.tar.gz sandanalyze
          ls -lh sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.tar.gz

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd dist
          Compress-Archive -Path sandanalyze.exe -DestinationPath sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.zip
          Get-Item sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.zip

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          chmod +x sandanalyze
          tar -czf sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.tar.gz sandanalyze
          ls -lh sandanalyze-${{ matrix.target }}-${{ matrix.arch }}.tar.gz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sandanalyze-${{ matrix.target }}-${{ matrix.arch }}
          path: |
            dist/sandanalyze-*.tar.gz
            dist/sandanalyze-*.zip
          if-no-files-found: warn

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sandanalyze-*

      - name: List downloaded artifacts
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: false
